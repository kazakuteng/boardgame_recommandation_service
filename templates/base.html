<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭐할게임?</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=3">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'index' %}" class="navbar-brand">
            <i class="fa-solid fa-dice"></i> 뭐할게임?
        </a>
        <div class="navbar-links">
            <a href="{% url 'index' %}" class="{% if request.path == '/' or request.path == '/boardgames/' %}active{% endif %}"><i class="fa-solid fa-link"></i> 추천</a>
            <a href="#" id="navPenaltyBtn"><i class="fa-regular fa-square"></i> 벌칙/순서</a>
            <a href="{% url 'community:index' %}" class="{% if 'community' in request.path %}active{% endif %}"><i class="fa-regular fa-comment"></i> 낙서장</a>
            
            {% if user.is_authenticated %}
                <a href="{% url 'accounts:profile' user.pk %}"><i class="fa-regular fa-user"></i> {{ user.username }}</a>
                <form action="{% url 'accounts:logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" style="background:none; border:none; color:var(--text-light); font-weight:600; cursor:pointer; font-size:1rem; margin-left:1rem;">로그아웃</button>
                </form>
            {% else %}
                <a href="{% url 'accounts:login' %}">로그인</a>
                <a href="{% url 'accounts:signup' %}">회원가입</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Global Modals -->
    <div class="modal-overlay" id="toolModal">
        <div class="modal-content retro-window" style="padding: 3px;">
            <div class="retro-titlebar">
                <span id="retroModalTitle"><i class="fa-solid fa-triangle-exclamation"></i> 시스템 메시지</span>
                <div class="retro-titlebar-close" onclick="closeToolModal()">X</div>
            </div>
            <div class="retro-content-inner">
                <div id="toolModalBody">
                    <!-- Tool content injected here -->
                </div>
                <div style="margin-top: 15px; font-size: 0.75rem; color: var(--text-light); text-align: right;">※ 클릭은 자유, 결과는 책임 안 짐</div>
            </div>
        </div>
    </div>

    <!-- B-grade Retro Ads (Bottom Right) -->
    <div style="position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 15px; pointer-events: none;">
        <!-- Ad 1: Penalty -->
        <div style="pointer-events: auto; background: var(--box-bg); border: 3px outset #eadecc; padding: 3px; width: 150px; text-align: center; box-shadow: 4px 4px 0px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s;" onclick="openToolModal('penalty')" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            <div style="background: #fff; border: 2px inset #eadecc; padding: 10px 5px;">
                <div style="color: red; font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; animation: blink 1s infinite;">[ 경 고 ]</div>
                <div style="color: var(--primary-color); font-size: 0.9rem; font-weight: 900; margin-bottom: 10px; line-height: 1.3;">☠ 벌칙 안 뽑고<br>도망갈거임?</div>
                <button style="background: var(--accent-color); color: white; border: 2px outset #eadecc; font-size: 0.85rem; font-weight: bold; width: 100%; padding: 4px 0; cursor: pointer; box-shadow: none;">벌칙 룰렛 ➔</button>
            </div>
        </div>

        <!-- Ad 2: Turn -->
        <div style="pointer-events: auto; background: var(--box-bg); border: 3px dashed var(--secondary-color); padding: 5px; width: 150px; text-align: center; box-shadow: 4px 4px 0px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s;" onclick="openToolModal('turn')" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            <div style="background: #fff; padding: 8px 5px; border: 1px solid var(--secondary-color);">
                <div style="color: var(--primary-color); font-size: 0.9rem; font-weight: 900; margin-bottom: 10px; line-height: 1.3;">🪜 순서 정하고<br>보드게임하자!</div>
                <button style="background: var(--secondary-color); color: #fff; border: 2px outset #eadecc; font-size: 0.85rem; font-weight: bold; width: 100%; padding: 4px 0; cursor: pointer; box-shadow: none;">순서 정하기 ➔</button>
            </div>
        </div>
    </div>

    <style>
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        .retro-window {
            background: var(--box-bg) !important;
            border: 3px outset #eadecc !important;
            border-radius: 0 !important;
            padding: 3px !important;
            box-shadow: 6px 6px 0px rgba(93, 63, 46, 0.2) !important;
            max-width: 450px !important;
        }
        .retro-titlebar {
            background: var(--primary-color);
            color: white;
            padding: 4px 8px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .retro-titlebar-close {
            background: var(--box-bg);
            color: var(--primary-color);
            border: 2px outset #eadecc;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
            line-height: 1;
            font-weight: bold;
        }
        .retro-titlebar-close:active {
            border-style: inset;
        }
        .retro-content-inner {
            background: var(--bg-color);
            border: 2px inset #eadecc;
            padding: 20px;
        }
        /* Override base modal close since we have our retro close button */
        .modal-content > .modal-close {
            display: none;
        }
    </style>

    <script>
        function openToolModal(type) {
            const overlay = document.getElementById('toolModal');
            const body = document.getElementById('toolModalBody');
            const titleEl = document.getElementById('retroModalTitle');
            overlay.style.display = 'flex';
            
            if (type === 'penalty') {
                titleEl.innerHTML = '<i class="fa-solid fa-skull"></i> 벌칙_프로그램.exe';
                body.innerHTML = `
                    <div style="margin-bottom:20px; text-align: left;">
                        <button class="btn btn-red" style="width:auto; padding:0.4rem 0.8rem; box-shadow:none; font-size:0.9rem; border-radius: 0; border: 2px outset #eadecc;">벌칙 뽑기</button>
                        <button class="btn btn-brown" style="width:auto; padding:0.4rem 0.8rem; box-shadow:none; font-size:0.9rem; opacity:0.7; border-radius: 0; border: 2px outset #eadecc;" onclick="openToolModal('turn')">순서 정하기</button>
                    </div>
                    <h2 style="color:var(--primary-color);">오늘의 희생자는?</h2>
                    <p style="color:var(--text-light);">불만 있기 없기? ㅋㅋ</p>
                    <div class="card" style="margin:20px 0; background:var(--box-bg); border:none; cursor:pointer;" id="drawArea">
                        <i class="fa-regular fa-hand" style="font-size:3rem; color:var(--text-light); margin-bottom:10px;"></i>
                        <p id="drawResultText" style="font-weight:bold; color:var(--text-light);">아래 버튼을 눌러 뽑으세요</p>
                    </div>
                    <button class="btn btn-red" onclick="drawPenalty()">↓ 뽑기!</button>
                `;
            } else if (type === 'turn') {
                titleEl.innerHTML = '<i class="fa-solid fa-users"></i> 순서_추첨기.exe';
                body.innerHTML = `
                    <div style="margin-bottom:20px; text-align: left;">
                        <button class="btn btn-brown" style="width:auto; padding:0.4rem 0.8rem; box-shadow:none; font-size:0.9rem; opacity:0.7; border-radius: 0; border: 2px outset #eadecc;" onclick="openToolModal('penalty')">벌칙 뽑기</button>
                        <button class="btn btn-red" style="width:auto; padding:0.4rem 0.8rem; box-shadow:none; font-size:0.9rem; background-color:#3a5a80; border-radius: 0; border: 2px outset #eadecc;">순서 정하기</button>
                    </div>
                    <h2 style="color:var(--primary-color);">누가 먼저 할래?</h2>
                    <p style="color:var(--text-light);">공평하게 랜덤으로 ㄱㄱ</p>
                    <div style="margin:10px 0;">
                        <input type="number" id="playerCount" class="input-field" placeholder="몇 명인가요?" min="2" max="10" style="text-align:center; width:50%;">
                    </div>
                    <div class="card" style="margin:20px 0; background:var(--box-bg); border:none; padding:1rem;" id="turnArea">
                        <p id="turnResultText" style="font-weight:bold; color:var(--text-light);">인원수를 입력하고 뽑아주세요</p>
                    </div>
                    <button class="btn btn-brown" onclick="decideTurn()">↓ 뽑기!</button>
                `;
            }
        }

        function closeToolModal() {
            document.getElementById('toolModal').style.display = 'none';
        }

        function drawPenalty() {
            const penalties = ["인디안 밥", "딱밤 맞기", "음료수 쏘기", "뒷정리 하기", "심부름 1회", "무사 통과!"];
            const r = Math.floor(Math.random() * penalties.length);
            const textEl = document.getElementById('drawResultText');
            
            textEl.innerHTML = `<span style="color:var(--accent-color); font-size:1.5rem;">${penalties[r]}</span>`;
        }

        function decideTurn() {
            const count = parseInt(document.getElementById('playerCount').value);
            if (!count || count < 2) {
                alert("2명 이상 입력해주세요!");
                return;
            }
            let arr = Array.from({length: count}, (_, i) => i + 1);
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            const textEl = document.getElementById('turnResultText');
            textEl.innerHTML = `<span style="color:var(--primary-color); font-size:1.2rem;">순서: ${arr.join(' ➔ ')}</span>`;
        }

        document.getElementById('navPenaltyBtn').addEventListener('click', (e) => {
            e.preventDefault();
            openToolModal('penalty');
        });
        
        window.onclick = function(event) {
            const modal = document.getElementById('toolModal');
            if (event.target == modal) {
                closeToolModal();
            }
        }
    </script>
</body>
</html>
