<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭐할게임?</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=4">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'index' %}" class="navbar-brand">
            <i class="fa-solid fa-dice"></i> 뭐할게임?
        </a>
        <div class="navbar-links">
            <a href="{% url 'index' %}" class="{% if request.path == '/' or request.path == '/boardgames/' %}active{% endif %}"><i class="fa-solid fa-link"></i> 추천</a>
            <a href="/?tool=penalty"><i class="fa-solid fa-circle-exclamation"></i> 벌칙</a>
            <a href="/?tool=turn"><i class="fa-solid fa-route"></i> 순서</a>
            <a href="{% url 'community:index' %}" class="{% if 'community' in request.path %}active{% endif %}"><i class="fa-regular fa-comment"></i> 낙서장</a>
            
            {% if user.is_authenticated %}
                <a href="{% url 'accounts:profile' user.pk %}"><i class="fa-regular fa-user"></i> {{ user.username }}</a>
                <form action="{% url 'accounts:logout' %}" method="post" class="navbar-logout-form">
                    {% csrf_token %}
                    <button type="submit">로그아웃</button>
                </form>
            {% else %}
                <a href="{% url 'accounts:login' %}">로그인</a>
                <a href="{% url 'accounts:signup' %}">회원가입</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <script>
        function openToolModal(type) {
            window.location.href = `/?tool=${type}`;
        }
    </script>
</body>
</html>
